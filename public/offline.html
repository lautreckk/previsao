<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PALPITEX - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    .container { max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    button { background: #80FF00; color: #0a0a0a; border: none; padding: 12px 32px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Voce esta offline</h1>
    <p>Verifique sua conexao com a internet e tente novamente. Os mercados ao vivo precisam de conexao para funcionar.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
