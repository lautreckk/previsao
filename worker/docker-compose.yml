  # Tick rounds every 60s (advances betting/observation phases for all cameras)
  tick-rounds:
    <<: *worker
    entrypoint: ["python", "-c"]
    command: >
      "
      import time, requests, os
      API = os.environ['API_URL']
      SECRET = os.environ['WORKER_SECRET']
      CAMERAS = [
        'cam_sp055_km110b','cam_sp055_km110a','cam_sp055_km073','cam_sp055_km055',
        'cam_sp055_km083','cam_sp055_km092','cam_sp055_km136','cam_sp055_km168',
        'cam_sp055_km193','cam_sp055_km211a','cam_sp055_km211b','cam_sp008_km095',
        'cam_sp046_km167',
      ]
      print('[Tick] Starting round ticker...')
      while True:
        for mid in CAMERAS:
          try:
            r = requests.post(f'{API}/api/camera/round', json={'market_id': mid, 'secret': SECRET}, timeout=15)
            print(f'[Tick] {mid}: {r.status_code} {r.json().get(\"action\",\"?\")}')
          except Exception as e:
            print(f'[Tick] {mid}: ERROR {e}')
        time.sleep(60)
      "
