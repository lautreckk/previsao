services:
  camera-worker:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    restart: always
    env_file: .env
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --market-id cam_sp008_km095
      --stream-url https://34.104.32.249.nip.io/SP008-KM095/stream.m3u8
      --stream-type hls
      --api-url ${API_URL}
      --secret ${WORKER_SECRET}
      --supabase-url ${SUPABASE_URL}
      --supabase-key ${SUPABASE_KEY}
      --mediamtx-url rtsp://localhost:8554
      --roi-x-start 0.08 --roi-x-end 0.85 --line-y 0.48
      --confidence 0.30 --tolerance 35
      --model yolov8s.pt
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tick-rounds:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    restart: always
    env_file: .env
    cpus: 0.1
    mem_limit: 128m
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: ["python", "tick_rounds.py"]
    command: []
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
